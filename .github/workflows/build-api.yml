name: Build API
on:
  workflow_dispatch:
  #schedule:
  #  - cron:  '30 11 * * *'
jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wca
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306

    steps:
      # https://github.com/marketplace/actions/setup-php-action
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl

      # https://github.com/marketplace/actions/checkout
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy .env file
        run: cp .env.github-actions .env

      - name: Wait for services to boot
        run: sleep 10

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: Build the new api
        run: |
          set -e
          
          # Check if there's a new version
          NEW_VERSION=$(curl -s -L https://www.worldcubeassociation.org/api/v0/export/public)
          CURRENT_VERSION=$(curl -s -f -L https://raw.githubusercontent.com/robiningelbrecht/wca-rest-api/v1/v1/version.json || echo "")
          
          echo $NEW_VERSION
          echo $CURRENT_VERSION
          
          if [ "$NEW_VERSION" != "$CURRENT_VERSION" ]; then
            # Download and unzip WCA export.
            rm -Rf wca-export
            mkdir wca-export
            
            echo "Downloading WCA export..."
            curl https://www.worldcubeassociation.org/export/results/v2/sql -L --output "wca-export/export.zip"
            
            echo "Unzipping WCA export..."
            unzip wca-export/export.zip -d wca-export
            
            # Import SQL file into db.
            echo "Importing WCA export to database..."
            # We need to remove the first line from the import file, because it causes MySQL to crash during import
            tail -n +2 wca-export/WCA_export.sql > wca-export/tmp.sql && mv wca-export/tmp.sql wca-export/WCA_export.sql
            # Now import
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca < wca-export/WCA_export.sql
            
            # Add indexes for faster processing
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "
              CREATE INDEX wca_id_index ON persons (wca_id);
              CREATE INDEX person_id_competition_id_index ON results (person_id, competition_id);
              CREATE INDEX competition_id_index ON results (competition_id);
              CREATE INDEX event_id_index ON results (event_id);
              CREATE INDEX competition_id_index ON championships (competition_id);
              CREATE INDEX person_id_index ON ranks_single (person_id);
              CREATE INDEX event_id_index ON ranks_single (event_id);
              CREATE INDEX person_id_index ON ranks_average (person_id);
              CREATE INDEX event_id_index ON ranks_average (event_id);
              CREATE INDEX result_id_attempt_index ON result_attempts (result_id, attempt_number);
            "
            
            # Build API.
            bin/console app:api:build "continent,country,event,competition,championship,person,rank,result,version"
          else
             echo "No new version detected, exiting, bye."
          fi
      - name: Backup current v1 branch
        run: |
          if git ls-remote --exit-code origin v1 > /dev/null 2>&1; then
            git push origin origin/v1:refs/heads/v1-backup --force
          else
            echo "No existing v1 branch, skipping backup."
          fi

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/v1
          cp -r docs/* _site/
          cp -r api/* _site/v1/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: v1
          force_orphan: true

      - name: Commit version date to master
        run: |
          git config --global user.name 'robiningelbrecht'
          git config --global user.email 'robiningelbrecht@users.noreply.github.com'
          git add README.md docs/openapi.yml
          git diff --staged --quiet || git commit -m "Update version date"
          git push