name: Build API
on:
  workflow_dispatch:
  #schedule:
  #  - cron:  '30 11 * * *'
jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wca
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306

    steps:
      # https://github.com/marketplace/actions/setup-php-action
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl

      # https://github.com/marketplace/actions/checkout
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy .env file
        run: cp .env.github-actions .env

      - name: Wait for services to boot
        run: sleep 10

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: Build the new api
        run: |
          set -e
          
          # Check if there's a new version
          NEW_VERSION=$(curl -s -L https://www.worldcubeassociation.org/api/v0/export/public)
          CURRENT_VERSION=$(curl -s -f -L https://raw.githubusercontent.com/robiningelbrecht/wca-rest-api/api/api/version.json || echo "")
          
          echo $NEW_VERSION
          echo $CURRENT_VERSION
          
          if [ "$NEW_VERSION" != "$CURRENT_VERSION" ]; then
            # Download and unzip WCA export.
            rm -Rf wca-export
            mkdir wca-export
            
            echo "Downloading WCA export..."
            curl https://www.worldcubeassociation.org/export/results/v2/sql -L --output "wca-export/export.zip"
            
            echo "Unzipping WCA export..."
            unzip wca-export/export.zip -d wca-export
            
            # Import SQL file into db.
            echo "Importing WCA export to database..."
            # We need to remove the first line from the import file, because it causes MySQL to crash during import
            tail -n +2 wca-export/WCA_export.sql > wca-export/tmp.sql && mv wca-export/tmp.sql wca-export/WCA_export.sql
            # Now import
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca < wca-export/WCA_export.sql
            
            # Add indexes for faster processing
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX wca_id_index ON persons (wca_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX person_id_index ON results (person_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX competition_id_index ON results (competition_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX event_id_index ON results (event_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX competition_id_index ON championships (competition_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX person_id_index ON ranks_single (person_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX event_id_index ON ranks_single (event_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX person_id_index ON ranks_average (person_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX event_id_index ON ranks_average (event_id)"
            mysql --host="127.0.0.1" --port=3306 --user=root --password=root wca -e "CREATE INDEX result_id_index ON result_attempts (result_id)"
            
            # Build API.
            bin/console app:api:build "continent,country,event,competition,championship,person,rank,result,version"
          else
             echo "No new version detected, exiting, bye."
          fi
      - name: Backup current api branch
        run: |
          if git ls-remote --exit-code origin api > /dev/null 2>&1; then
            git push origin origin/api:refs/heads/api-backup --force
          else
            echo "No existing api branch, skipping backup."
          fi

      - name: Deploy API to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api
          publish_branch: api
          destination_dir: api
          force_orphan: true
      - name: ntfy.sh
        uses: robiningelbrecht/ntfy-action@v1.0.0
        if: always()
        with:
            url: ${{ secrets.NTFY_URL }}
            topic: ${{ secrets.NTFY_TOPIC }}
            icon: 'https://github.githubassets.com/images/modules/profile/achievements/starstruck-default.png'
            job_status: ${{ job.status }}
