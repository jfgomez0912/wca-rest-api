paths:
  /v1/continents.json:
    get:
      tags:
        - general
      summary: continents
      description: |
        This API call provides a list of continents used by the WCA, including their names and unique identifiers.
      operationId: getContinents
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Continents'
      x-code-samples:
        - lang: 'cURL'
          source: |
            curl --location 'https://raw.githubusercontent.com/robiningelbrecht/wca-rest-api/refs/heads/v1/continents.json'
        - lang: PHP - Guzzle
          source: |
            $response = (new Client())->request('GET', 'https://raw.githubusercontent.com/robiningelbrecht/wca-rest-api/refs/heads/v1/continents.json');
            echo $response->getBody()->getContent();
