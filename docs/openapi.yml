openapi: 3.0.2
info:
  title: Unofficial World Cube Association API
  description: |
    # Introduction
    
    Welcome to the **unofficial** World Cube Association (WCA) Public API documentation! Here, you'll find all the information you need to integrate this API seamlessly into your projects. Access competition data, results, competitor profiles, rankings, and more.

    **Note:** This API is served through static JSON files on *GitHub*, which means the structure of the endpoints has limitations. The reason for doing so is:

    * The data doesn't change that much, max once a day
    * Static file-based API is (or should be) very fast
    * I don't want to pay for any hosting because it could get very expensive, very fast
    
    The API is updated once a day so rankings and results are not real-time.
    
    > This information is based on competition results owned and maintained by the
    > World Cube Association, published at https://www.worldcubeassociation.org/export/results
    > as of <!--START_SECTION:version-date-->May 23, 2026<!--END_SECTION:version-date-->.
    
    I'm in no way affiliated with or part of the official WCA software team.
    
    ## Overviews
    
    Every list of items is structured in the same way and contains 3 properties:
    
    * `pagination` - Contains page info for the current request
    * `total` - Indicates the total number of items available for this model
    * `ìtems` - The list of items for the current page
    
    ```json
    {
      "pagination": {
        "page": 1,
        "size": 1000
      },
      "total": 3465,
      "items": []
    }
    ```
    
    ## Pagination
    
    Each page contains a specific number of items (max 1000), allowing you to retrieve data incrementally. By using pagination, 
    you can request and display only the necessary data at a given time, 
    which enhances performance and reduces resource consumption. 
    
    To determine the total number of pages, 
    you'll need to divide the total number of items by the page size (which is hardcoded to 1000).
    
    To navigate through the pages, you can adjust the page parameter in subsequent requests. 
    For example, to retrieve the second page of data, you would set `competitions-page-2.json`.
