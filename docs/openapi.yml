tags:
  - name: general
    description: |
      The general endpoints are mainly here to determine the identifiers you can use for subsequent requests.
      For example: If you need to provide an `{event}` in a request, you can use `api/events.json` 
      to determine the list of allowed values. Same goes for `{continent}` and `{country}`.
  - name: competition
    description: |
      The competition API calls offer access to various endpoints that provide comprehensive information about competitions.
  - name: championship
    description: |
      The championship API calls offer access to various endpoints that provide comprehensive information about competitions.
      These are very similar to the competition API calls because championships are glorified competitions 😉.
  - name: person
    description: |
      The person API calls contain comprehensive data about people. Among some basic info, the ranking and results are included as well.
  - name: rank
    description: |
      The rank API calls only contain the first 1000 places. If you want to fetch a rank of a specific person,
      use the `api/persons/{id}` API call.
  - name: result
    description: |
      The result API calls are centered around fetching detailed results per competition.
